databases:
  - name: wagtail-wtr-db
    plan: free
    # WARNING: Free plan databases expire after 90 days and have no backups.
    # Upgrade to a paid plan for production use.
    databaseName: wagtail_wtr
    user: wagtail_wtr

services:
  - type: web
    name: wagtail-wtr
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /_health/
    port: 8000
    # Run collectstatic before the new container takes traffic so gunicorn
    # starts immediately and the health check responds without delay.
    preDeployCommand: "python manage.py collectstatic --noinput"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wagtail-wtr-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
        # IMPORTANT: After first deploy, copy the generated value and pin it as
        # a fixed env var in the Render dashboard. If this key is regenerated
        # (e.g. by recreating the service), all existing sessions, password-reset
        # tokens, and CSRF tokens are immediately invalidated.
      - key: DJANGO_SETTINGS_MODULE
        value: wagtail_wtr.settings.production
      # Render injects PORT and forwards inbound traffic to this port.
      # Must match the port: field above and what gunicorn binds to.
      - key: PORT
        value: "8000"
      # Set to your Render hostname and any custom domains.
      # Example: mysite.onrender.com,mysite.org
      - key: ALLOWED_HOSTS
        sync: false
      # Required: the full public URL used by the Wagtail admin (no trailing slash).
      # Example: https://mysite.onrender.com
      - key: WAGTAILADMIN_BASE_URL
        sync: false
      # Render injects PORT and forwards inbound traffic to this port.
      # Must match the port: field above and what gunicorn binds to.
      - key: PORT
        value: "8000"
      # --- S3 storage (optional but strongly recommended) ---
      # When set, both static files (CSS/JS/fonts) and uploaded media (images,
      # documents) are stored in S3 under static/ and media/ prefixes.
      # WARNING: Without S3, uploaded media is stored on Render's ephemeral disk
      # and will be lost on every new deploy. Configure S3 for any deployment
      # where editors upload content.
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_REGION_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_CUSTOM_DOMAIN
        sync: false
      # --- SMTP email (optional) ---
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      # EMAIL_USE_TLS=true for STARTTLS (port 587, default).
      # EMAIL_USE_SSL=true for implicit SSL (port 465). These are mutually exclusive.
      - key: EMAIL_USE_TLS
        sync: false
      - key: EMAIL_USE_SSL
        sync: false
      # --- Cloudflare cache invalidation (optional) ---
      - key: CLOUDFLARE_BEARER_TOKEN
        sync: false
      - key: CLOUDFLARE_ZONE_ID
        sync: false
      # --- Gunicorn ---
      # Default is 4. Tune based on your Render plan's RAM (each worker ~50-80 MB).
      # Free plan (512 MB): 2 workers. Starter plan (2 GB): 4 workers.
      - key: WEB_CONCURRENCY
        value: "2"
