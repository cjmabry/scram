{% load i18n %}
{% if link_page %}
    <a href="{{ link_page.url }}"
       class="inline-block rounded-md px-5 py-2.5 font-heading font-semibold transition
              {% if style == 'secondary' %}bg-secondary-600 text-light hover:bg-secondary-700
              {% elif style == 'outline' %}border-2 border-primary-600 text-primary-600 hover:bg-primary-50
              {% else %}bg-primary-600 text-light hover:bg-primary-700{% endif %}">
        {{ text }}
    </a>
{% elif link_url %}
    <a href="{{ link_url }}"
       rel="noopener noreferrer"
       class="inline-block rounded-md px-5 py-2.5 font-heading font-semibold transition
              {% if style == 'secondary' %}bg-secondary-600 text-light hover:bg-secondary-700
              {% elif style == 'outline' %}border-2 border-primary-600 text-primary-600 hover:bg-primary-50
              {% else %}bg-primary-600 text-light hover:bg-primary-700{% endif %}">
        {{ text }}
    </a>
{% endif %}
