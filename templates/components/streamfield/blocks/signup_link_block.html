{% load i18n wagtailcore_tags %}
<div class="my-8 rounded-lg bg-neutral-50 px-6 py-10 text-center">
    <div class="mx-auto max-w-2xl">
        <h2 class="font-heading text-2xl font-bold text-dark md:text-3xl">{{ value.heading }}</h2>
        {% if value.description %}
            <div class="prose prose-neutral mt-4 max-w-none">
                {{ value.description|richtext }}
            </div>
        {% endif %}
        <div class="mt-8">
            {% trans "Sign Up" as default_signup_text %}
            <a href="{{ value.external_url }}"
               rel="noopener noreferrer"
               class="inline-block rounded-md bg-primary-600 px-6 py-2.5 font-heading font-semibold text-light transition hover:bg-primary-700">
                {{ value.button_text|default:default_signup_text }}
            </a>
        </div>
    </div>
</div>
