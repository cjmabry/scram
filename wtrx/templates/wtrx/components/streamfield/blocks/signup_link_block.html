{% load i18n wagtailcore_tags %}
<div class="wtr-signup rounded-lg bg-neutral-50 px-6 py-10 text-center"{% if value.anchor_id %} id="{{ value.anchor_id }}"{% endif %}>
    <div class="mx-auto max-w-2xl">
        {% if value.heading %}<h2 class="font-heading text-2xl font-bold text-dark md:text-3xl">{{ value.heading }}</h2>{% endif %}
        {% if value.description %}
            <div class="prose prose-neutral mt-4 max-w-none">
                {{ value.description|richtext }}
            </div>
        {% endif %}
        <div class="mt-8">
            {% trans "Sign Up" as default_signup_text %}
            <a href="{{ value.external_url }}"
               rel="noopener noreferrer"
               class="wtr-btn hover:bg-primary-500">
                {{ value.button_text|default:default_signup_text }}
            </a>
        </div>
    </div>
</div>
